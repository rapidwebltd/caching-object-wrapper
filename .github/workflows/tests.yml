name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '5.6'
            composer: '2.2'
            dependencies: lowest
          - php: '8.5'
            composer: latest
            dependencies: highest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:${{ matrix.composer }}
          coverage: none
      - run: composer validate --strict
      - if: matrix.dependencies == 'lowest'
        run: composer update --prefer-lowest --prefer-stable --no-interaction
      - if: matrix.dependencies == 'highest'
        run: composer update --prefer-stable --no-interaction
      - run: vendor/bin/phpunit --no-coverage

  psr-cache-3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:latest
          coverage: none
      - run: composer remove --dev phpunit/phpunit rapidwebltd/rw-file-cache-psr-6 --no-update --no-interaction
      - run: composer require psr/cache:^3.0 --no-update --no-interaction
      - run: composer update --no-dev --prefer-stable --no-interaction
      - run: composer show psr/cache | grep '^versions.*3\\.'
      - run: php -l src/CachingObjectWrapper.php
